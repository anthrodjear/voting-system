---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: voting-system
  labels:
    app: rabbitmq
    component: message-queue
data:
  RABBITMQ_PORT: "5672"
  RABBITMQ_MANAGEMENT_PORT: "15672"
  RABBITMQ_DEFAULT_VHOST: "/"
  RABBITMQ_DEFAULT_USER: "admin"
  RABBITMQ_LOG_LEVEL: "info"
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: voting-system
  labels:
    app: rabbitmq
    component: message-queue
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
    component: message-queue
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      protocol: TCP
    - name: management
      port: 15672
      targetPort: 15672
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-deployment
  namespace: voting-system
  labels:
    app: rabbitmq
    component: message-queue
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: rabbitmq
      component: message-queue
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: rabbitmq
        component: message-queue
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "15672"
    spec:
      serviceAccountName: voting-system-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: amqp
              containerPort: 5672
              protocol: TCP
            - name: management
              containerPort: 15672
              protocol: TCP
          envFrom:
            - configMapRef:
                name: rabbitmq-config
            - secretRef:
                name: rabbitmq-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - check_running
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-pvc
  namespace: voting-system
  labels:
    app: rabbitmq
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 8Gi
