---
apiVersion: v1
kind: Secret
metadata:
  name: database-secrets
  namespace: voting-system
  labels:
    app: voting-system
    component: secrets
type: Opaque
stringData:
  # Database credentials - replace with actual values
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: changeme-password-123
  POSTGRES_DB: voting_system
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secrets
  namespace: voting-system
  labels:
    app: voting-system
    component: secrets
type: Opaque
stringData:
  # RabbitMQ credentials - replace with actual values
  RABBITMQ_DEFAULT_USER: admin
  RABBITMQ_DEFAULT_PASS: changeme-password-456
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: voting-system
  labels:
    app: voting-system
    component: secrets
type: Opaque
stringData:
  # JWT Secret - MUST be changed in production (min 32 characters)
  JWT_SECRET: your-super-secret-jwt-key-change-in-production-min-32-chars
  JWT_EXPIRATION: "1d"
  # Database password (referenced from database-secrets)
  DB_PASSWORD: changeme-password-123
  # RabbitMQ credentials
  RABBITMQ_USER: admin
  RABBITMQ_PASSWORD: changeme-password-456
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: voting-system
  labels:
    app: voting-system
    component: secrets
type: Opaque
stringData:
  # Redis password (optional - uncomment if using Redis auth)
  # REDIS_PASSWORD: changeme-redis-password
