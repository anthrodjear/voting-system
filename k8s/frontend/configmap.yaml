---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: voting-system
  labels:
    app: frontend
    component: web
data:
  NODE_ENV: "production"
  NEXT_PUBLIC_API_URL: "http://backend-service:3001"
  APP_NAME: "IEBC Voting System"
  NEXT_TELEMETRY_DISABLED: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: voting-system
  labels:
    app: frontend
    component: web
spec:
  type: ClusterIP
  selector:
    app: frontend
    component: web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  sessionAffinity: None
