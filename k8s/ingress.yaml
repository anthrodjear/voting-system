---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voting-system-ingress
  namespace: voting-system
  labels:
    app: voting-system
    component: ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "balanced"
    nginx.ingress.kubernetes.io/session-cookie-name: "voting-session"
    nginx.ingress.kubernetes.io/session-cookie-attrs: "SameSite=Lax;Secure"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/tls-acme: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - voting.example.com
        - api.voting.example.com
      secretName: voting-system-tls
  rules:
    - host: voting.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
    - host: api.voting.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3001
---
apiVersion: v1
kind: Secret
metadata:
  name: voting-system-tls
  namespace: voting-system
type: kubernetes.io/tls
data:
  # Base64 encoded cert and key - replace with actual values
  # echo -n "cert-content" | base64
  # echo -n "key-content" | base64
  # Or use cert-manager to automatically provision
  tls.crt: ""
  tls.key: ""
