---
apiVersion: v1
kind: Namespace
metadata:
  name: voting-system
  labels:
    app.kubernetes.io/name: voting-system
    app.kubernetes.io/component: namespace
    app.kubernetes.io/managed-by: kubectl
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: voting-system-sa
  namespace: voting-system
  labels:
    app: voting-system
    component: service-account
  annotations:
    description: "Service account for voting system applications"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: voting-system-role
  namespace: voting-system
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: voting-system-rolebinding
  namespace: voting-system
subjects:
  - kind: ServiceAccount
    name: voting-system-sa
    namespace: voting-system
roleRef:
  kind: Role
  name: voting-system-role
  apiGroup: rbac.authorization.k8s.io
