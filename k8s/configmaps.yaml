---
apiVersion: v1
kind: ConfigMap
metadata:
  name: voting-system-config
  namespace: voting-system
  labels:
    app: voting-system
    component: config
data:
  APP_NAME: "IEBC Voting System"
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-config
  namespace: voting-system
  labels:
    app: voting-system
    component: monitoring
data:
  PROMETHEUS_ENABLED: "true"
  PROMETHEUS_PORT: "9090"
  GRAFANA_ENABLED: "true"
  GRAFANA_PORT: "3000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: namespace-config
  namespace: voting-system
data:
  namespace: voting-system
